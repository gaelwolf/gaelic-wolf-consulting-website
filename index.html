<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaelic Wolf Consulting - Magic Wolf in Magic Valley</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
    </style>
</head>
<body class="bg-white font-sans">
    <!-- Hero -->
    <div class="relative h-screen flex items-center justify-center overflow-hidden">
        <img src="https://via.placeholder.com/1920x1080/0f766e/ffffff?text=Magic+Valley+with+Magic+Wolf" alt="Magic Wolf in Magic Valley" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/30 to-black/70"></div>
        <div class="relative z-10 text-center px-6 max-w-4xl mx-auto">
            <h1 class="text-7xl md:text-8xl font-bold text-white tracking-tighter mb-4">Magic Wolf</h1>
            <p class="text-4xl md:text-5xl text-white/90 mb-8">in Magic Valley</p>
            <p class="text-xl md:text-2xl text-white/80 max-w-md mx-auto">Gaelic Wolf Consulting</p>
            <p class="mt-12 text-white">Professional Natural Resource Policy Services</p>
            <a href="#bio" class="mt-16 inline-block px-10 py-5 bg-white text-teal-900 font-semibold rounded-2xl hover:bg-amber-200 transition-colors">Meet NJM</a>
        </div>
    </div>
    <!-- Bio Section Placeholder -->
    <section id="bio" class="py-24 bg-white">
        <div class="max-w-4xl mx-auto px-6">
            <h2 class="text-5xl font-semibold text-center mb-12">NJM Bio</h2>
            <p class="text-center text-xl">Upload your bio portrait to /images/njm-bio-portrait.webp and replace placeholder.</p>
        </div>
    </section>
    <footer class="bg-teal-900 text-white py-12 text-center">
        <p>&copy; Gaelic Wolf Consulting. All rights reserved.</p>
    </footer>
    <script>
        document.documentElement.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
